<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lifestyle">
<title>Lifestyle Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%239bb38a'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d0f17;
    color: #ecead8;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }
  body { min-height: 100vh; min-height: 100dvh; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  /* iOS safe area */
  #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const STORAGE_KEY = 'lifestyle-tracker-v5';

const C = {
  bg: '#0d0f17', bg2: '#141826', bg3: '#1c2132',
  ink: '#ecead8', inkDim: '#8c8d83', line: '#2a2c3e',
  sage: '#9bb38a', gold: '#d4a44c', teal: '#4a8b8b',
  rust: '#c75640', plum: '#8b5a8c', slate: '#5e6779'
};

// Inline SVG icons (no lucide-react needed in CDN setup)
const Icon = ({ d, size = 14, color = 'currentColor', strokeWidth = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    {typeof d === 'string' ? <path d={d} /> : d}
  </svg>
);

const icons = {
  check: 'M20 6 9 17l-5-5',
  plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  minus: <line x1="5" y1="12" x2="19" y2="12"/>,
  moon: 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z',
  coffee: <><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></>,
  sparkles: 'M12 3v18M3 12h18M5.6 5.6l12.8 12.8M5.6 18.4l12.8-12.8',
  book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></>,
  wrench: 'M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z',
  file: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
  dumbbell: <><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></>,
  footprints: <><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/><path d="M16 17h4"/><path d="M4 13h4"/></>,
  more: <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
  rotate: <><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>,
  cap: 'M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0zM6 12v5c3 3 9 3 12 0v-5M22 10v6',
  alert: 'M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z',
};

const PT_CONFIG = {
  initialDone: 17,
  total: 30,
  startDate: '2026-05-04',
  estimatedEnd: '2026-06-17',
};

const AXES = [
  { id: 'axis1', label: 'Axis I', sub: '지경학+사회과학', color: C.rust, icon: 'sparkles' },
  { id: 'axis2', label: 'Axis II', sub: '에너지경제학', color: C.gold, icon: 'book' },
  { id: 'tool', label: 'Tool', sub: 'Claude Skill', color: C.teal, icon: 'wrench' },
  { id: 'book', label: 'Book', sub: '자유 독서', color: C.plum, icon: 'file' },
];

const EXERCISE_TYPES = [
  { id: 'pt', label: 'PT', icon: 'dumbbell', color: C.gold },
  { id: 'run', label: '러닝', icon: 'footprints', color: C.teal },
  { id: 'other', label: '기타', icon: 'more', color: C.sage },
];

const GUIDE_TASKS = [
  { id: 'w1-mon', week: 1, label: '월 5/4 — Age of Unpeace 첫 30분 + PT 18회째' },
  { id: 'w1-tue', week: 1, label: '화 5/5 — IEA WEO 10페이지' },
  { id: 'w1-sun', week: 1, label: '일 5/10 — 카페 1시간 + 회고 5줄' },
  { id: 'w2-mon', week: 2, label: '월 5/11 — Axis I 30분 + PT' },
  { id: 'w2-tue', week: 2, label: '화 5/12 — Axis II 30분' },
  { id: 'w2-wed', week: 2, label: '수 5/13 — 첫 Skill 1쪽 + PT' },
  { id: 'w2-sun', week: 2, label: '일 5/17 — 카페 2시간 + 러닝' },
  { id: 'w3-mon', week: 3, label: '월 5/18 — Axis I 30분 + PT' },
  { id: 'w3-tue', week: 3, label: '화 5/19 — Axis II 30분' },
  { id: 'w3-wed', week: 3, label: '수 5/20 — Skill 실제 사용 + PT' },
  { id: 'w3-sun', week: 3, label: '일 5/24 — 카페 1시간 (가볍게 마무리)' },
];

const initialData = () => ({
  startDate: '2026-05-04',
  days: {},
  books: [
    { id: 'leonard', title: 'The Age of Unpeace', author: 'Mark Leonard', axis: 'I', progress: 0, total: 250 },
    { id: 'iea', title: 'IEA WEO Exec Summary', author: 'IEA', axis: 'II', progress: 0, total: 30 }
  ],
  guideTasks: {}
});

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const dDay = (targetDate) => {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(targetDate); target.setHours(0,0,0,0);
  return Math.ceil((target - today) / (1000*60*60*24));
};

const formatDateShort = (dateStr) => {
  const d = new Date(dateStr);
  const day = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${day})`;
};

function App() {
  const [data, setData] = useState(null);
  const [savedFlash, setSavedFlash] = useState(false);

  useEffect(() => {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        setData({ ...initialData(), ...JSON.parse(stored) });
      } else {
        setData(initialData());
      }
    } catch {
      setData(initialData());
    }
  }, []);

  const saveData = (newData) => {
    setData(newData);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1200);
    } catch (e) { console.error(e); }
  };

  if (!data) {
    return (
      <div style={{minHeight:'100vh', background:C.bg, color:C.inkDim, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontFamily:'monospace', letterSpacing:'0.1em'}}>
        loading...
      </div>
    );
  }

  const today = todayStr();
  const todayData = data.days[today] || { axes: [], exerciseType: null, sleepHrs: 8, note: '', cafe: false };
  const dToStart = dDay(data.startDate);

  const ptDoneSinceStart = Object.values(data.days).filter(d => d.exerciseType === 'pt').length;
  const ptCompleted = PT_CONFIG.initialDone + ptDoneSinceStart;
  const ptRemaining = Math.max(0, PT_CONFIG.total - ptCompleted);
  const ptDone = ptRemaining === 0;

  const updateToday = (patch) => {
    saveData({ ...data, days: { ...data.days, [today]: { ...todayData, ...patch } } });
  };

  const toggleAxis = (axisId) => {
    const axes = todayData.axes.includes(axisId)
      ? todayData.axes.filter(a => a !== axisId)
      : [...todayData.axes, axisId];
    updateToday({ axes });
  };

  const setExerciseType = (typeId) => {
    updateToday({ exerciseType: todayData.exerciseType === typeId ? null : typeId });
  };

  const toggleGuideTask = (taskId) => {
    saveData({ ...data, guideTasks: { ...data.guideTasks, [taskId]: !data.guideTasks[taskId] } });
  };

  const updateBookProgress = (bookId, delta) => {
    const books = data.books.map(b =>
      b.id === bookId ? { ...b, progress: Math.max(0, Math.min(b.total, b.progress + delta)) } : b
    );
    saveData({ ...data, books });
  };

  const thisWeekDays = [];
  const todayD = new Date();
  const dayOfWeek = todayD.getDay();
  const monday = new Date(todayD);
  monday.setDate(todayD.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    thisWeekDays.push({ date: ds, day: ['월','화','수','목','금','토','일'][i], data: data.days[ds] || null, isToday: ds === today });
  }
  const weekActiveDays = thisWeekDays.filter(d => d.data && d.data.axes && d.data.axes.length > 0).length;

  const todayDay = ['일','월','화','수','목','금','토'][new Date(today).getDay()];
  const completedTasks = Object.values(data.guideTasks).filter(Boolean).length;

  return (
    <div style={{minHeight:'100vh', background:C.bg, color:C.ink, padding:'16px 0 60px'}}>
      <div style={{maxWidth: 520, margin: '0 auto', padding:'0 16px'}}>

        <header style={{marginBottom: 20, paddingTop: 8, borderTop: `2px solid ${C.sage}`, position:'relative'}}>
          <div style={{position:'absolute', top:-2, left:0, width:60, height:5, background: C.sage}} />
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', paddingTop:14}}>
            <span style={{fontFamily:'ui-monospace, monospace', fontSize:9, color: C.sage, letterSpacing:'0.25em', textTransform:'uppercase'}}>
              Lifestyle Tracker
            </span>
            <span style={{fontFamily:'ui-monospace, monospace', fontSize:9, color: savedFlash ? C.sage : 'transparent', letterSpacing:'0.15em', transition:'color 0.3s'}}>
              ✓ saved
            </span>
          </div>

          <h1 style={{fontSize: 32, fontStyle:'italic', fontWeight:600, lineHeight:1, marginTop:8, marginBottom:6, fontFamily:'Georgia, serif'}}>
            {today.split('-')[1]}<span style={{color:C.sage}}>.</span>{today.split('-')[2]}
            <span style={{fontSize:13, color:C.inkDim, marginLeft:10, fontStyle:'normal', fontFamily:'inherit', fontWeight:500}}>
              {todayDay}요일
            </span>
          </h1>

          <div style={{padding:'10px 12px', background:'rgba(155,179,138,0.06)', borderLeft:`2px solid ${C.sage}`, fontSize:12, color:C.inkDim, lineHeight:1.5}}>
            {dToStart > 0 ? (
              <span>D-{dToStart} · 5/4(월) 시작까지. <b style={{color:C.ink}}>이번주는 평소대로 OK</b></span>
            ) : dToStart === 0 ? (
              <b style={{color:C.sage}}>오늘이 시작일! 21:30 책상에 앉기.</b>
            ) : (
              <span>D+{Math.abs(dToStart)+1} · 시작 {Math.abs(dToStart)+1}일째 · Level 0</span>
            )}
          </div>
        </header>

        {/* Today */}
        <section style={{background:C.bg2, border:`1px solid ${C.line}`, padding:'18px 16px', marginBottom:14}}>
          <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, marginBottom:10, textTransform:'uppercase'}}>Today</div>
          <h2 style={{fontSize:17, fontStyle:'italic', fontWeight:600, marginBottom:14, color:C.ink, fontFamily:'Georgia, serif'}}>
            오늘 무엇을 했나요?
          </h2>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:12}}>
            {AXES.map(ax => {
              const active = todayData.axes.includes(ax.id);
              return (
                <button key={ax.id} onClick={() => toggleAxis(ax.id)} style={{
                  background: active ? `${ax.color}20` : 'rgba(255,255,255,0.02)',
                  border: `1px solid ${active ? ax.color : C.line}`,
                  padding: '10px 11px', textAlign:'left', cursor:'pointer', transition: 'all 0.15s',
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:3}}>
                    <Icon d={icons[ax.icon]} size={11} color={active ? ax.color : C.inkDim} />
                    <span style={{fontSize:10, fontWeight:700, color: active ? ax.color : C.inkDim, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em'}}>{ax.label}</span>
                  </div>
                  <div style={{fontSize:10.5, color: active ? C.ink : C.inkDim, lineHeight:1.3}}>{ax.sub}</div>
                </button>
              );
            })}
          </div>

          <div style={{marginBottom:12}}>
            <div style={{fontFamily:'ui-monospace, monospace', fontSize:8.5, color:C.inkDim, letterSpacing:'0.2em', marginBottom:5, textTransform:'uppercase'}}>운동 종류</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:5}}>
              {EXERCISE_TYPES.map(et => {
                const active = todayData.exerciseType === et.id;
                const isPt = et.id === 'pt';
                const disabled = isPt && ptDone && !active;
                return (
                  <button key={et.id} onClick={() => !disabled && setExerciseType(et.id)} disabled={disabled} style={{
                    background: active ? `${et.color}25` : 'rgba(255,255,255,0.02)',
                    border: `1px solid ${active ? et.color : C.line}`,
                    padding: '8px 6px', cursor: disabled ? 'not-allowed' : 'pointer',
                    display:'flex', flexDirection:'column', alignItems:'center', gap:3, justifyContent:'center',
                    opacity: disabled ? 0.4 : 1,
                  }}>
                    <Icon d={icons[et.icon]} size={14} color={active ? et.color : C.inkDim} />
                    <span style={{fontSize:11, color: active ? et.color : C.inkDim, fontWeight: active ? 700 : 500, letterSpacing:'0.05em'}}>
                      {et.label}{isPt && ` (${ptRemaining})`}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>

          <button onClick={() => updateToday({ cafe: !todayData.cafe })} style={{
            width:'100%',
            background: todayData.cafe ? `${C.rust}20` : 'rgba(255,255,255,0.02)',
            border: `1px solid ${todayData.cafe ? C.rust : C.line}`,
            padding: '8px 10px', cursor:'pointer',
            display:'flex', alignItems:'center', gap:6, justifyContent:'center',
            marginBottom: 12,
          }}>
            <Icon d={icons.coffee} size={12} color={todayData.cafe ? C.rust : C.inkDim} />
            <span style={{fontSize:11, color: todayData.cafe ? C.rust : C.inkDim, fontWeight: todayData.cafe ? 700 : 500}}>
              카페 {todayData.cafe && '✓'}
            </span>
          </button>

          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12, padding:'8px 12px', background:'rgba(0,0,0,0.25)', border:`1px dashed ${C.line}`}}>
            <div style={{display:'flex', alignItems:'center', gap:7}}>
              <Icon d={icons.moon} size={12} color={C.inkDim} />
              <span style={{fontSize:11, color:C.inkDim}}>어젯밤 수면</span>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <button onClick={() => updateToday({sleepHrs: Math.max(4, (todayData.sleepHrs ?? 8) - 0.5)})}
                style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, width:24, height:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}}>
                <Icon d={icons.minus} size={10} />
              </button>
              <span style={{fontSize:13, fontWeight:700, color: (todayData.sleepHrs ?? 8) >= 8 ? C.sage : C.gold, minWidth:36, textAlign:'center', fontFamily:'ui-monospace, monospace'}}>
                {todayData.sleepHrs ?? 8}h
              </span>
              <button onClick={() => updateToday({sleepHrs: Math.min(12, (todayData.sleepHrs ?? 8) + 0.5)})}
                style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, width:24, height:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}}>
                <Icon d={icons.plus} size={10} />
              </button>
            </div>
          </div>

          <input type="text" value={todayData.note || ''} onChange={e => updateToday({ note: e.target.value })}
            placeholder="한 줄 메모 (선택)"
            style={{width:'100%', padding:'9px 11px', background:'rgba(0,0,0,0.25)', border:`1px solid ${C.line}`, color:C.ink, fontSize:12, outline:'none', boxSizing:'border-box'}} />
        </section>

        {/* PT Counter */}
        <section style={{background:C.bg2, border:`1px solid ${ptDone ? C.sage : C.gold}`, padding:'18px 16px', marginBottom:14, position:'relative', overflow:'hidden'}}>
          <div style={{position:'absolute', top:0, left:0, right:0, height:3, background: ptDone ? C.sage : C.gold}} />

          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14}}>
            <div>
              <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color: ptDone ? C.sage : C.gold, marginBottom:4, textTransform:'uppercase', display:'flex', alignItems:'center', gap:5}}>
                <Icon d={icons.dumbbell} size={10} />
                PT · 30회 코스
              </div>
              <div style={{fontSize:13, color:C.ink, fontWeight:600, fontStyle:'italic', fontFamily:'Georgia, serif'}}>
                {ptDone ? '✓ 코스 완주' : '마지막 페이즈'}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:24, fontWeight:700, color:ptDone ? C.sage : C.gold, fontFamily:'Georgia, serif', lineHeight:1, fontStyle:'italic'}}>
                {ptCompleted}<span style={{fontSize:14, color:C.inkDim, fontStyle:'normal'}}>/{PT_CONFIG.total}</span>
              </div>
              <div style={{fontSize:9.5, color:C.inkDim, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em', marginTop:2}}>
                {ptDone ? 'COMPLETE' : `${ptRemaining} LEFT`}
              </div>
            </div>
          </div>

          <div style={{height:10, background:C.bg3, position:'relative', overflow:'hidden', marginBottom:8, border:`1px solid ${C.line}`}}>
            <div style={{position:'absolute', left:0, top:0, height:'100%', width: `${(PT_CONFIG.initialDone / PT_CONFIG.total) * 100}%`, background: C.slate, opacity:0.6}} />
            <div style={{position:'absolute', left:`${(PT_CONFIG.initialDone / PT_CONFIG.total) * 100}%`, top:0, height:'100%', width: `${(ptDoneSinceStart / PT_CONFIG.total) * 100}%`, background: C.gold, transition:'width 0.4s'}} />
          </div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:9, fontFamily:'ui-monospace, monospace', color:C.inkDim, letterSpacing:'0.05em', marginBottom:14}}>
            <span>이전 17회</span>
            <span style={{color:C.gold, fontWeight:600}}>+ {ptDoneSinceStart}회 (5/4~)</span>
            <span>목표 30</span>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12}}>
            <div style={{padding:'9px 11px', background:'rgba(0,0,0,0.2)', border:`1px dashed ${C.line}`}}>
              <div style={{fontSize:8.5, fontFamily:'ui-monospace, monospace', color:C.inkDim, letterSpacing:'0.15em', marginBottom:3, textTransform:'uppercase'}}>주 페이스</div>
              <div style={{fontSize:12, color:C.ink, fontWeight:600}}>2회 · 월·수</div>
            </div>
            <div style={{padding:'9px 11px', background:'rgba(0,0,0,0.2)', border:`1px dashed ${C.line}`}}>
              <div style={{fontSize:8.5, fontFamily:'ui-monospace, monospace', color:C.inkDim, letterSpacing:'0.15em', marginBottom:3, textTransform:'uppercase'}}>예상 종료</div>
              <div style={{fontSize:12, color: ptDone ? C.sage : C.gold, fontWeight:700}}>
                {ptDone ? '완료 ✓' : `${formatDateShort(PT_CONFIG.estimatedEnd)}`}
              </div>
            </div>
          </div>

          {!ptDone && (
            <div>
              <div style={{padding:'10px 12px', background:'rgba(212,164,76,0.06)', borderLeft:`2px solid ${C.gold}`, fontSize:11, color:C.inkDim, lineHeight:1.5, marginBottom:8, display:'flex', alignItems:'flex-start', gap:8}}>
                <Icon d={icons.alert} size={11} color={C.gold} />
                <div>
                  <b style={{color:C.gold}}>변동성:</b> 한 번 빠질 때마다 약 3~4일 연장. 도쿄 주(5/26~29)는 이미 반영. <b style={{color:C.ink}}>±1주 변동 정상.</b>
                </div>
              </div>
              <div style={{padding:'10px 12px', background:'rgba(155,179,138,0.06)', borderLeft:`2px solid ${C.sage}`, fontSize:11, color:C.inkDim, lineHeight:1.5, display:'flex', alignItems:'flex-start', gap:8}}>
                <Icon d={icons.cap} size={12} color={C.sage} />
                <div>
                  <b style={{color:C.sage}}>종료 후 (6/17~):</b> 월·수 PT 슬롯 → <b style={{color:C.ink}}>자유 운동으로 전환</b> (홈트·러닝·휴식)
                </div>
              </div>
            </div>
          )}

          {ptDone && (
            <div style={{padding:'12px 14px', background:`${C.sage}15`, borderLeft:`3px solid ${C.sage}`, fontSize:12, color:C.ink, lineHeight:1.5, fontStyle:'italic', fontFamily:'Georgia, serif'}}>
              "30회 졸업. 이제 운동 패턴은 본인이 만들 차례 — 자유로워졌습니다."
            </div>
          )}
        </section>

        {/* Week strip */}
        <section style={{marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8}}>
            <span style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, textTransform:'uppercase'}}>This Week</span>
            <span style={{fontSize:10.5, color:C.inkDim, fontFamily:'ui-monospace, monospace', letterSpacing:'0.05em'}}>{weekActiveDays} / 7 active</span>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3}}>
            {thisWeekDays.map(d => {
              const hasData = d.data && d.data.axes && d.data.axes.length > 0;
              const dayNum = parseInt(d.date.split('-')[2]);
              const isWeekend = d.day === '토' || d.day === '일';
              const wasPt = d.data && d.data.exerciseType === 'pt';
              return (
                <div key={d.date} style={{
                  background: hasData ? `${C.sage}20` : C.bg2,
                  border: `1px solid ${d.isToday ? C.sage : C.line}`,
                  padding:'9px 4px', textAlign:'center', position:'relative',
                }}>
                  {wasPt && <div style={{position:'absolute', top:2, right:2, width:5, height:5, background:C.gold, borderRadius:'50%'}} />}
                  <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, color: d.isToday ? C.sage : (isWeekend ? C.gold : C.inkDim), marginBottom:4, letterSpacing:'0.1em', fontWeight:600}}>{d.day}</div>
                  <div style={{fontSize:14, fontWeight: d.isToday ? 700 : 500, color: hasData ? C.sage : (d.isToday ? C.ink : C.inkDim), fontFamily:'Georgia, serif'}}>{dayNum}</div>
                  {hasData && (
                    <div style={{display:'flex', justifyContent:'center', gap:2, marginTop:5}}>
                      {d.data.axes.slice(0,4).map(aid => {
                        const ax = AXES.find(a => a.id === aid);
                        return <div key={aid} style={{width:4, height:4, background: ax?.color || C.sage, borderRadius:'50%'}} />;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:'flex', justifyContent:'flex-end', marginTop:6, fontSize:9, color:C.inkDim, fontFamily:'ui-monospace, monospace', letterSpacing:'0.05em'}}>
            <span style={{display:'flex', alignItems:'center', gap:4}}>
              <span style={{width:5, height:5, background:C.gold, borderRadius:'50%'}} /> = PT 한 날
            </span>
          </div>
        </section>

        {/* Books */}
        <section style={{marginBottom:14}}>
          <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, marginBottom:8, textTransform:'uppercase'}}>Books · 진도</div>
          {data.books.map(book => {
            const pct = Math.round((book.progress / book.total) * 100);
            const axisColor = book.axis === 'I' ? C.rust : C.gold;
            return (
              <div key={book.id} style={{background:C.bg2, border:`1px solid ${C.line}`, padding:'12px 14px', marginBottom:6}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10, marginBottom:8}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:'flex', gap:6, alignItems:'center', marginBottom:3}}>
                      <span style={{fontSize:8.5, fontFamily:'ui-monospace, monospace', color: axisColor, border:`1px solid ${axisColor}`, padding:'1px 5px', letterSpacing:'0.1em', fontWeight:600}}>AXIS {book.axis}</span>
                    </div>
                    <div style={{fontSize:12.5, fontWeight:700, color:C.ink, marginBottom:1, lineHeight:1.3}}>{book.title}</div>
                    <div style={{fontSize:10, color:C.inkDim}}>{book.author}</div>
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:5, flexShrink:0}}>
                    <button onClick={() => updateBookProgress(book.id, -10)} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, width:22, height:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}}>
                      <Icon d={icons.minus} size={9} />
                    </button>
                    <span style={{fontSize:10, color:C.inkDim, fontFamily:'ui-monospace, monospace', minWidth:48, textAlign:'center', letterSpacing:'0.05em'}}>{book.progress}/{book.total}p</span>
                    <button onClick={() => updateBookProgress(book.id, 10)} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, width:22, height:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}}>
                      <Icon d={icons.plus} size={9} />
                    </button>
                  </div>
                </div>
                <div style={{height:3, background:C.bg3, position:'relative', overflow:'hidden'}}>
                  <div style={{position:'absolute', left:0, top:0, height:'100%', width: `${pct}%`, background: axisColor, transition:'width 0.4s'}} />
                </div>
                <div style={{fontSize:9, color:C.inkDim, fontFamily:'ui-monospace, monospace', marginTop:4, letterSpacing:'0.1em'}}>{pct}%</div>
              </div>
            );
          })}
        </section>

        {/* Guide checklist */}
        <section style={{background:C.bg2, border:`1px solid ${C.line}`, padding:'16px', marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14}}>
            <div>
              <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, marginBottom:3, textTransform:'uppercase'}}>First 3 Weeks Guide</div>
              <div style={{fontSize:13, color:C.ink, fontWeight:600, fontStyle:'italic', fontFamily:'Georgia, serif'}}>5/4 ~ 5/24 · Level 0</div>
            </div>
            <div style={{fontSize:10.5, color:C.inkDim, fontFamily:'ui-monospace, monospace', letterSpacing:'0.05em'}}>{completedTasks} / {GUIDE_TASKS.length}</div>
          </div>

          {[1,2,3].map(week => (
            <div key={week} style={{marginBottom: week < 3 ? 12 : 0}}>
              <div style={{fontFamily:'ui-monospace, monospace', fontSize:8.5, color:C.sage, letterSpacing:'0.2em', marginBottom:5, opacity:0.75, textTransform:'uppercase'}}>Week {week}</div>
              {GUIDE_TASKS.filter(t => t.week === week).map(task => {
                const done = !!data.guideTasks[task.id];
                return (
                  <button key={task.id} onClick={() => toggleGuideTask(task.id)} style={{
                    width:'100%',
                    display:'flex', alignItems:'flex-start', gap:10,
                    padding:'8px 2px',
                    background:'transparent', border:'none',
                    borderBottom: `1px dashed ${C.line}`,
                    cursor:'pointer', textAlign:'left',
                  }}>
                    <div style={{
                      width:14, height:14, marginTop:1,
                      border: `1px solid ${done ? C.sage : C.line}`,
                      background: done ? C.sage : 'transparent',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      flexShrink:0,
                    }}>
                      {done && <Icon d={icons.check} size={9} color={C.bg} strokeWidth={3} />}
                    </div>
                    <span style={{
                      fontSize:11.5, lineHeight:1.4,
                      color: done ? C.inkDim : C.ink,
                      textDecoration: done ? 'line-through' : 'none',
                      textDecorationColor: C.inkDim,
                    }}>{task.label}</span>
                  </button>
                );
              })}
            </div>
          ))}
        </section>

        <div style={{marginTop:18, padding:'12px 14px', background:'rgba(155,179,138,0.04)', borderLeft:`2px solid ${C.sage}`, fontSize:11, color:C.inkDim, lineHeight:1.55}}>
          <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.2em', color:C.sage, marginBottom:4, textTransform:'uppercase'}}>Reminder</div>
          빠진 날 자책 X. 한 주 통째로 빠져도 OK. <b style={{color:C.ink}}>다음 슬롯에 다시 앉기만 하면 그게 성공입니다.</b>
        </div>

        <div style={{marginTop:28, paddingTop:14, borderTop:`1px solid ${C.line}`, textAlign:'center'}}>
          <button onClick={() => {
            if (window.confirm('모든 데이터를 초기화하시겠어요?')) {
              saveData(initialData());
            }
          }} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, padding:'5px 11px', fontSize:9, fontFamily:'ui-monospace, monospace', cursor:'pointer', letterSpacing:'0.2em', display:'inline-flex', alignItems:'center', gap:5, textTransform:'uppercase'}}>
            <Icon d={icons.rotate} size={9} />
            Reset
          </button>
          <div style={{fontSize:8.5, color:C.inkDim, marginTop:10, letterSpacing:'0.2em', fontFamily:'ui-monospace, monospace', textTransform:'uppercase'}}>
            v5 standalone · localStorage
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
