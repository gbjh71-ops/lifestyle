  return Math.ceil((tg - t) / 86400000);
};

};

const getWeekKey = (dateStr) => {
  const d = dateStr ? new Date(dateStr) : new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));
  return `${monday.getFullYear()}-W${String(getWeekNum(monday)).padStart(2,'0')}`;
};
const getWeekNum = (d) => {
  const target = new Date(d.valueOf());
  const dayNum = (d.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNum + 3);
  const firstThursday = target.valueOf();
  target.setMonth(0, 1);
  if (target.getDay() !== 4) {
    target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
  }
  return 1 + Math.ceil((firstThursday - target) / 604800000);
};

function calculateStreaks(days) {
  const sorted = Object.keys(days).sort();
  if (sorted.length === 0) return { activity: 0, exercise: 0, journal: 0, longest: 0 };
  const today = todayStr();

  const checkDay = (date, type) => {
    const d = days[date];
    if (!d) return false;
    if (type === 'activity') return d.axes && d.axes.length > 0;
    if (type === 'exercise') return !!d.exerciseType;
    if (type === 'journal') return (d.note && d.note.trim()) || (d.journal && d.journal.trim());
    return false;
  };

  const computeStreak = (type) => {
    let streak = 0;
    let checkDate = new Date();
    const todayFilled = checkDay(today, type);
    if (!todayFilled) checkDate.setDate(checkDate.getDate() - 1);
    while (true) {
      const ds = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
      if (checkDay(ds, type)) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else break;
    }
    return streak;
  };

  let longest = 0, current = 0, prevDate = null;
  sorted.forEach(d => {
    if (checkDay(d, 'activity')) {
      if (prevDate) {
        const diff = (new Date(d) - new Date(prevDate)) / 86400000;
        current = diff === 1 ? current + 1 : 1;
      } else current = 1;
      if (current > longest) longest = current;
      prevDate = d;
    } else { current = 0; prevDate = d; }
  });

  return { activity: computeStreak('activity'), exercise: computeStreak('exercise'), journal: computeStreak('journal'), longest };
}

const PHILOSOPHERS = [
  { id: 'socrates', name: '소크라테스', subtitle: 'Self-Examination', color: C.gold, motto: '"검토되지 않은 삶은 살 가치가 없다"' },
  { id: 'aristotle', name: '아리스토텔레스', subtitle: 'Eudaimonia · Habit', color: C.teal, motto: '"우리는 반복적으로 행하는 것의 결과다"' },
  { id: 'aurelius', name: '마르쿠스 아우렐리우스', subtitle: 'Stoic Discipline', color: C.slate, motto: '"통제할 수 있는 것에 집중하라"' },
  { id: 'frankl', name: '빅터 프랭클', subtitle: 'Logotherapy · Meaning', color: C.plum, motto: '"의미 없는 삶은 견딜 수 없는 고통이다"' },
  { id: 'sartre', name: '장 폴 사르트르', subtitle: 'Existentialism · Choice', color: C.rust, motto: '"인간은 자유롭도록 저주받았다"' },
];

function analyzePhilosophically(stats) {
  const { activeDays, exerciseDays, sleepAvg, axisCount, moodAvg, totalDays, journalDays } = stats;
  const consistency = activeDays / Math.max(totalDays, 1);
  const exerciseRate = exerciseDays / Math.max(totalDays, 1);
  const reflectionRate = journalDays / Math.max(totalDays, 1);
  const sleepHealth = sleepAvg >= 7.5;
  const balanceScore = axisCount;

  let socrates = reflectionRate > 0.6 ?
    `자기 검토의 빈도가 높습니다. ${journalDays}일 동안 일기를 작성하셨어요. 이는 'γνῶθι σεαυτόν'(너 자신을 알라)을 실천하는 모습입니다. 다만 *질문*에 집중해보세요 — 답을 적기보다 좋은 질문을 적는 날이 더 깊은 통찰을 줍니다.` :
    reflectionRate > 0.3 ?
    `검토의 습관이 자라고 있어요. 매일 일기를 쓸 필요는 없지만, *"오늘 내가 한 선택은 정말 내가 원한 것이었나?"* 같은 질문을 일주일에 2~3번 해보면 자기 인식이 깊어집니다.` :
    `소크라테스가 말한 *검토되지 않은 삶*에 가까운 패턴입니다. 행동은 있지만 그 행동에 대한 *질문*이 적어요. 한 줄 메모라도 좋으니 "왜 그랬을까?"를 적어보세요. 비난이 아닌 호기심으로.`;

  let aristotle = consistency > 0.7 ?
    `훌륭한 습관이 형성되고 있습니다. 아리스토텔레스는 덕(arete)이 단발성 영웅적 행동이 아니라 *반복되는 작은 행위*에서 나온다 했어요. ${Math.round(consistency*100)}%의 활동률은 그 자체로 이미 성취입니다.` :
    consistency > 0.4 ?
    `습관 형성의 중간 단계예요. 아리스토텔레스의 *hexis*(체득) 개념이 중요한 시기 — 의지가 아닌 *자동화*로 가는 다리. 너무 큰 목표보다 *오늘 하나*에 집중하세요.` :
    `아직 습관이 자리잡지 않은 단계입니다. 의지력에 의존하면 지칩니다. 아리스토텔레스의 조언: *환경을 바꿔라*. 책을 책상이 아닌 침대 옆에 두기, 운동복을 미리 입기 같은 작은 트리거가 의지보다 강합니다.`;

  let aurelius = (exerciseRate > 0.6 && sleepHealth) ?
    `몸과 정신 모두 통제하고 있습니다. 아우렐리우스의 *명상록*에서 "신체는 정신의 도구"라 했죠. 운동 ${exerciseDays}일, 평균 수면 ${sleepAvg.toFixed(1)}시간 — 이는 통제 가능한 영역에 충실한 모습. 통제 *불가능한* 것에 대한 걱정도 같이 줄여보세요.` :
    (exerciseRate > 0.3 || sleepHealth) ?
    `통제 가능한 것과 불가능한 것의 구분이 필요한 시기예요. 운동이나 수면 중 하나는 잘 지키고 있습니다. 아우렐리우스의 핵심 — *"오늘 아침 일어나서 살아있다는 것 자체가 특권"*. 작은 일관성을 자축하세요.` :
    `스토아 철학자가 강조한 *프로하이레시스*(선택 능력)가 약해진 상태일 수 있어요. 외부 상황이 아니라 *반응*을 통제하는 게 핵심. 오늘 아침에 한 가지 작은 의식적 선택 (예: 5분 산책)부터 회복해보세요.`;

  let frankl = balanceScore > 8 ?
    `다양한 영역에 의미를 분산시키고 있습니다. 프랭클은 *의미는 외부에서 오지 않고 자신이 부여한다*고 했어요. ${balanceScore}개의 axis 활동은 의미 있는 다층 구조. 다만 *왜* 이걸 하고 있는지를 가끔 다시 묻는 게 중요합니다.` :
    balanceScore > 3 ?
    `의미 부여가 진행 중인 단계입니다. 프랭클의 로고테라피 핵심: *상황이 통제 안 될 때 태도를 통제할 수 있다*. 작업 자체보다 그 작업의 *의미*를 한 줄로 적어두면 동력이 유지됩니다.` :
    `활동량이 줄어든 시기일 수 있어요. 프랭클이 강제수용소에서 발견한 것 — *의미를 가진 사람은 어떤 상황도 견딘다*. 큰 목표가 아니라, *내일 한 가지 약속*을 정하세요. 그게 의미의 씨앗이 됩니다.`;

  let sartre = (moodAvg && moodAvg < 2.5) ?
    `사르트르의 *bad faith*(자기기만)를 경계해야 할 시기입니다. "어쩔 수 없어"라고 말하는 순간 자유를 포기하는 거예요. 지금 기분이 안 좋아도, *다음 1시간을 어떻게 쓸지*는 100% 본인 선택입니다. 그 선택이 곧 정체성.` :
    consistency > 0.5 ?
    `사르트르의 *engagement*(참여) 상태입니다. 본인이 선택한 가치(대학원·운동·연구)에 행동으로 답하고 있어요. 다만 사르트르의 경고 — *타인의 시선이 아닌 본인의 자유*에서 선택하고 있는지 가끔 점검하세요.` :
    `사르트르가 말한 *자유의 무게*를 느끼는 단계일 수 있습니다. 선택지가 너무 많아 마비되는 것도 자유의 부작용. 해법은 단순 — *지금 이 순간 한 가지*만 선택하기. 완벽한 선택보다 *어떤 선택*이 자유의 실천입니다.`;

  return {
    socrates: { philosopher: PHILOSOPHERS[0], text: socrates },
    aristotle: { philosopher: PHILOSOPHERS[1], text: aristotle },
    aurelius: { philosopher: PHILOSOPHERS[2], text: aurelius },
    frankl: { philosopher: PHILOSOPHERS[3], text: frankl },
    sartre: { philosopher: PHILOSOPHERS[4], text: sartre },
  };
}

function generateInsights(stats) {
  const insights = [];
  const { activeDays, exerciseDays, sleepAvg, totalDays, journalDays, axisBreakdown } = stats;
  if (totalDays >= 3) {
    if (activeDays / totalDays > 0.7) insights.push({ type:'strength', icon:'check', text:`높은 일관성 — ${totalDays}일 중 ${activeDays}일 활동. 이미 형성된 리듬이 자산입니다.` });
    if (exerciseDays / totalDays > 0.6) insights.push({ type:'strength', icon:'check', text:`운동 빈도 양호 — 신체와 정신이 함께 작동하는 상태.` });
    if (sleepAvg && sleepAvg >= 7.5) insights.push({ type:'strength', icon:'check', text:`수면 8시간 보장이 거의 지켜지고 있어요 — 가장 어려운 비협상 영역을 해내는 중.` });
    if (sleepAvg && sleepAvg < 7) insights.push({ type:'caution', icon:'alert', text:`수면 평균 ${sleepAvg.toFixed(1)}h — 7시간 미만은 cognitive 성과 직결 손실. 다른 모든 노력이 약화됩니다.` });
    if (exerciseDays / totalDays < 0.3 && totalDays >= 5) insights.push({ type:'caution', icon:'alert', text:`운동 빈도 낮음. PT 외에도 가벼운 산책이라도 추가해보세요.` });
    if (axisBreakdown && Object.keys(axisBreakdown).length === 1) insights.push({ type:'suggest', icon:'sparkles', text:`한 axis에만 집중 중. 다양성이 회복력을 만듭니다 — 다음 주는 다른 axis 1개를 시도.` });
    if (journalDays / totalDays < 0.3 && totalDays >= 7) insights.push({ type:'suggest', icon:'pen', text:`기록(메모/일기)이 적은 편. 한 줄이라도 자기 검토는 장기적으로 가장 큰 ROI.` });
  }
  if (insights.length === 0) insights.push({ type:'info', icon:'sparkles', text:`데이터가 더 쌓이면 깊은 인사이트가 나옵니다. 일단 1주일 채워보세요.` });
  return insights;
}

function generateGrowthSuggestions(stats) {
  const out = [];
  const { exerciseDays, sleepAvg, totalDays, journalDays, axisBreakdown } = stats;
  if (totalDays < 7) out.push({ title: '첫 주 완주', body: '아직 데이터가 적어요. 7일 채우면 첫 패턴이 보입니다. 완벽 X, 일단 자리에 앉기.', priority: 1 });
  if (sleepAvg && sleepAvg < 7.5) out.push({ title: '수면 30분 앞당기기', body: '23:30 취침을 23:00로. 다른 어떤 변화보다 효과 큽니다. 23:00에 알람 1개 추가해보세요.', priority: 1 });
  if (exerciseDays / Math.max(totalDays,1) < 0.4) out.push({ title: '운동 마찰 줄이기', body: '운동복 미리 꺼내두기, 운동가방 문 앞에 두기. 의지보다 환경이 강합니다.', priority: 2 });
  if (axisBreakdown && Object.values(axisBreakdown).length < 2 && totalDays >= 7) out.push({ title: '주제 다양화', body: '한 axis만 계속하면 burnout. 다음 주 1번이라도 다른 axis 시도 — 회복력 = 다양성.', priority: 2 });
  if (journalDays / Math.max(totalDays,1) < 0.3 && totalDays >= 5) out.push({ title: '주 2회 일기', body: '"오늘 가장 좋았던 1순간 + 가장 어려웠던 1순간" 만 적기. 5분이면 충분.', priority: 2 });
  if (out.length === 0) out.push({ title: '현재 페이스 유지', body: '큰 변화 필요 없음. 의도적으로 동일 페이스 유지하면서 4주 후 다시 검토.', priority: 3 });
  return out.sort((a,b) => a.priority - b.priority);
}

function computeStats(days, range) {
  const allDates = Object.keys(days).sort();
  let targetDates = allDates;
  if (range === 'week') {
    const end = new Date(); end.setHours(0,0,0,0);
    const start = new Date(end); start.setDate(end.getDate() - 6);
    targetDates = allDates.filter(d => new Date(d) >= start && new Date(d) <= end);
  } else if (range === 'month') {
    const end = new Date(); end.setHours(0,0,0,0);
    const start = new Date(end); start.setDate(end.getDate() - 29);
    targetDates = allDates.filter(d => new Date(d) >= start && new Date(d) <= end);
  }
  const totalDays = range === 'week' ? 7 : (range === 'month' ? 30 : Math.max(targetDates.length, 1));
  const targetData = targetDates.map(d => days[d]).filter(Boolean);
  const activeDays = targetData.filter(d => d.axes && d.axes.length > 0).length;
  const exerciseDays = targetData.filter(d => d.exerciseType).length;
  const journalDays = targetData.filter(d => (d.note && d.note.trim()) || (d.journal && d.journal.trim())).length;
  const sleeps = targetData.filter(d => d.sleepHrs).map(d => d.sleepHrs);
  const sleepAvg = sleeps.length ? sleeps.reduce((a,b) => a+b, 0) / sleeps.length : null;
  const moods = targetData.filter(d => d.mood).map(d => d.mood);
  const moodAvg = moods.length ? moods.reduce((a,b) => a+b, 0) / moods.length : null;
  let axisCount = 0;
  const axisBreakdown = {};
  targetData.forEach(d => {
    if (d.axes) {
      axisCount += d.axes.length;
      d.axes.forEach(a => { axisBreakdown[a] = (axisBreakdown[a] || 0) + 1; });
    }
  });
  return { totalDays, activeDays, exerciseDays, journalDays, sleepAvg, moodAvg, axisCount, axisBreakdown };
}

function MonthlyHeatmap({ days, axes }) {
  const [offset, setOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(null);

  const target = useMemo(() => {
    const d = new Date();
    d.setMonth(d.getMonth() + offset);
    d.setDate(1);
    d.setHours(0,0,0,0);
    return d;
  }, [offset]);

  const year = target.getFullYear();
  const month = target.getMonth();
  const monthLabel = `${year}.${String(month+1).padStart(2,'0')}`;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDayOfWeek = new Date(year, month, 1).getDay();

  const offset2 = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;
  const cells = [];
  for (let p = 0; p < offset2; p++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const todayKey = todayStr();
  const getDayIntensity = (day) => {
    if (!day) return null;
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const data = days[ds];
    if (!data) return { intensity: 0, key: ds, isToday: ds === todayKey };
    let score = 0;
    if (data.axes && data.axes.length > 0) score += data.axes.length;
    if (data.exerciseType) score += 1;
    if (data.journal && data.journal.trim()) score += 1;
    if (data.note && data.note.trim()) score += 0.5;
    return { intensity: Math.min(score, 5), key: ds, isToday: ds === todayKey, data };
  };

  const getColor = (intensity) => {
    if (!intensity || intensity === 0) return C.bg3;
    const opacity = Math.min(0.2 + (intensity / 5) * 0.7, 0.9);
    return `rgba(155, 179, 138, ${opacity})`;
  };

  const selected = selectedDate ? days[selectedDate] : null;

  return (
    <div style={{background:C.bg2, border:`1px solid ${C.line}`, padding:16, marginBottom:14}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
        <button onClick={() => setOffset(offset - 1)} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, padding:6, cursor:'pointer'}}>
          <Ic d={i.chevronLeft} size={12} />
        </button>
        <div style={{fontFamily:'Georgia, serif', fontStyle:'italic', fontWeight:600, fontSize:18, color:C.ink}}>{monthLabel}</div>
        <button onClick={() => setOffset(Math.min(0, offset + 1))} disabled={offset === 0} style={{
          background:'transparent', border:`1px solid ${C.line}`, color:offset === 0 ? C.line : C.inkDim,
          padding:6, cursor: offset === 0 ? 'not-allowed' : 'pointer', opacity: offset === 0 ? 0.3 : 1,
        }}>
          <Ic d={i.chevronRight} size={12} />
        </button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3, marginBottom:5}}>
        {['월','화','수','목','금','토','일'].map((d, idx) => (
          <div key={d} style={{textAlign:'center', fontSize:9, fontFamily:'ui-monospace, monospace', color: idx >= 5 ? C.gold : C.inkDim, letterSpacing:'0.1em', padding:'3px 0'}}>{d}</div>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3, marginBottom:12}}>
        {cells.map((day, idx) => {
          if (!day) return <div key={idx} />;
          const info = getDayIntensity(day);
          const color = getColor(info?.intensity);
          const isSelected = selectedDate === info?.key;
          return (
            <button key={idx} className="heatmap-cell"
              onClick={() => setSelectedDate(isSelected ? null : info.key)}
              style={{
                aspectRatio: '1', background: color,
                border: `1px solid ${info?.isToday ? C.sage : (isSelected ? C.gold : C.line)}`,
                cursor: 'pointer', position:'relative',
                display:'flex', alignItems:'center', justifyContent:'center',
                padding: 0, fontSize: 10, fontFamily:'Georgia, serif',
                color: info?.intensity > 2 ? C.bg : C.ink,
                fontWeight: info?.isToday ? 700 : 500,
              }}>
              {day}
              {info?.data?.exerciseType === 'pt' && (<div style={{position:'absolute', top:1, right:1, width:3, height:3, background:C.gold, borderRadius:'50%'}} />)}
              {info?.data?.cafe && (<div style={{position:'absolute', bottom:1, left:1, width:3, height:3, background:C.rust, borderRadius:'50%'}} />)}
            </button>
          );
        })}
      </div>

      <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontSize:9, color:C.inkDim, fontFamily:'ui-monospace, monospace', letterSpacing:'0.05em', marginBottom:8}}>
        <span>적음</span>
        {[0, 1, 2, 3, 4, 5].map(v => (<div key={v} style={{width:11, height:11, background:getColor(v), border:`1px solid ${C.line}`}} />))}
        <span>많음</span>
      </div>

      {selected && (
        <div style={{padding:'10px 12px', background:'rgba(0,0,0,0.25)', border:`1px dashed ${C.gold}`, fontSize:11.5, color:C.ink, lineHeight:1.55}}>
          <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, color:C.gold, letterSpacing:'0.15em', marginBottom:4, textTransform:'uppercase'}}>{fmt(selectedDate)}</div>
          {selected.axes?.length > 0 && (
            <div style={{display:'flex', gap:5, flexWrap:'wrap', marginBottom:4}}>
              {selected.axes.map(aid => {
                const ax = axes.find(a => a.id === aid);
                if (!ax) return null;
                return <span key={aid} style={{fontSize:9, padding:'2px 6px', border:`1px solid ${ax.color}`, color:ax.color}}>{ax.label}</span>;
              })}
            </div>
          )}
          {selected.exerciseType && <div style={{fontSize:11, color:C.teal}}>운동: {EXERCISE_TYPES.find(t => t.id === selected.exerciseType)?.label}</div>}
          {selected.mood && <div style={{fontSize:11}}>기분: {MOODS.find(m => m.v === selected.mood)?.emoji} {MOODS.find(m => m.v === selected.mood)?.label}</div>}
          {selected.note && <div style={{fontSize:11, color:C.inkDim, fontStyle:'italic', marginTop:4}}>"{selected.note}"</div>}
        </div>
      )}
    </div>
  );
}

function ManageTab({ data, saveData, setModal, modal }) {
  const exportData = () => {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `tracker-${todayStr()}.json`;
    a.click(); URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const imported = JSON.parse(event.target.result);
        if (window.confirm('현재 데이터를 가져온 데이터로 덮어쓰시겠어요?')) {
          saveData({ ...initialData(), ...imported });
        }
      } catch { alert('파일 형식 오류'); }
    };
    reader.readAsText(file);
  };

  const addAxis = () => {
    const newAxis = { id: 'axis_' + uid(), label: '새 항목', sub: '설명', color: C.sage, icon: 'sparkles' };
    saveData({ ...data, axes: [...data.axes, newAxis] });
    setModal({ type: 'axis', id: newAxis.id });
  };
  const deleteAxis = (id) => { if (window.confirm('이 항목을 삭제하시겠어요?')) saveData({ ...data, axes: data.axes.filter(a => a.id !== id) }); };
  const updateAxis = (id, patch) => saveData({ ...data, axes: data.axes.map(a => a.id === id ? { ...a, ...patch } : a) });
  const addBook = () => {
    const newBook = { id: 'book_' + uid(), title: '새 책', author: '저자', axis: 'I', progress: 0, total: 200 };
    saveData({ ...data, books: [...data.books, newBook] });
    setModal({ type: 'book', id: newBook.id });
  };
  const deleteBook = (id) => { if (window.confirm('이 책을 삭제하시겠어요?')) saveData({ ...data, books: data.books.filter(b => b.id !== id) }); };
  const updateBook = (id, patch) => saveData({ ...data, books: data.books.map(b => b.id === id ? { ...b, ...patch } : b) });
  const addTask = () => {
    const newTask = { id: 'task_' + uid(), week: 1, label: '새 task' };
    saveData({ ...data, guideTasks: [...data.guideTasks, newTask] });
    setModal({ type: 'task', id: newTask.id });
  };
  const deleteTask = (id) => {
    if (window.confirm('삭제하시겠어요?')) {
      const newDone = { ...data.guideTasksDone }; delete newDone[id];
      saveData({ ...data, guideTasks: data.guideTasks.filter(t => t.id !== id), guideTasksDone: newDone });
    }
  };
  const updateTask = (id, patch) => saveData({ ...data, guideTasks: data.guideTasks.map(t => t.id === id ? { ...t, ...patch } : t) });

  const editingAxis = modal?.type === 'axis' ? data.axes.find(a => a.id === modal.id) : null;
  const editingBook = modal?.type === 'book' ? data.books.find(b => b.id === modal.id) : null;
  const editingTask = modal?.type === 'task' ? data.guideTasks.find(t => t.id === modal.id) : null;

  return (
    <div>
      <section style={{background:C.bg2, border:`1px solid ${C.line}`, padding:16, marginBottom:14}}>
        <div style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, marginBottom:10, textTransform:'uppercase'}}>백업 · 동기화</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
          <button onClick={exportData} style={{padding:'10px 12px', background:'rgba(74,139,139,0.15)', border:`1px solid ${C.teal}`, color:C.teal, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, fontSize:11, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em'}}>
            <Ic d={i.download} size={12} />Export
          </button>
          <label style={{padding:'10px 12px', background:'rgba(212,164,76,0.15)', border:`1px solid ${C.gold}`, color:C.gold, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, fontSize:11, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em'}}>
            <Ic d={i.upload} size={12} />Import
            <input type="file" accept=".json" onChange={importData} style={{display:'none'}} />
          </label>
        </div>
        <p style={{fontSize:10.5, color:C.inkDim, lineHeight:1.5, marginTop:10}}>Export로 데이터를 JSON 파일로 저장. <b style={{color:C.ink}}>월 1회 백업 권장.</b></p>
      </section>

      <section style={{marginBottom:14}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, textTransform:'uppercase'}}>학습 영역</span>
          <button onClick={addAxis} style={{padding:'4px 10px', background:`${C.sage}20`, border:`1px solid ${C.sage}`, color:C.sage, cursor:'pointer', fontSize:10, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em', display:'flex', alignItems:'center', gap:4}}>
            <Ic d={i.plus} size={9} />추가
          </button>
        </div>
        {data.axes.map(ax => (
          <div key={ax.id} style={{background:C.bg2, border:`1px solid ${C.line}`, borderLeft:`3px solid ${ax.color}`, padding:'12px 14px', marginBottom:5, display:'flex', justifyContent:'space-between', alignItems:'center', gap:8}}>
            <div style={{flex:1, minWidth:0, display:'flex', alignItems:'center', gap:10}}>
              <Ic d={i[ax.icon]} size={14} color={ax.color} />
              <div>
                <div style={{fontSize:12.5, color:C.ink, fontWeight:700}}>{ax.label}</div>
                <div style={{fontSize:10, color:C.inkDim}}>{ax.sub}</div>
              </div>
            </div>
            <div style={{display:'flex', gap:4}}>
              <button onClick={() => setModal({type:'axis', id:ax.id})} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, padding:5, cursor:'pointer', display:'flex'}}><Ic d={i.edit} size={11} /></button>
              <button onClick={() => deleteAxis(ax.id)} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.rust, padding:5, cursor:'pointer', display:'flex'}}><Ic d={i.trash} size={11} /></button>
            </div>
          </div>
        ))}
      </section>

      <section style={{marginBottom:14}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, textTransform:'uppercase'}}>책 관리</span>
          <button onClick={addBook} style={{padding:'4px 10px', background:`${C.sage}20`, border:`1px solid ${C.sage}`, color:C.sage, cursor:'pointer', fontSize:10, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em', display:'flex', alignItems:'center', gap:4}}>
            <Ic d={i.plus} size={9} />추가
          </button>
        </div>
        {data.books.map(book => (
          <div key={book.id} style={{background:C.bg2, border:`1px solid ${C.line}`, padding:'10px 14px', marginBottom:5, display:'flex', justifyContent:'space-between', alignItems:'center', gap:8}}>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontSize:12, color:C.ink, fontWeight:700, marginBottom:2}}>{book.title}</div>
              <div style={{fontSize:10, color:C.inkDim}}>{book.author} · Axis {book.axis} · {book.progress}/{book.total}p</div>
            </div>
            <div style={{display:'flex', gap:4, flexShrink:0}}>
              <button onClick={() => setModal({type:'book', id:book.id})} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, padding:5, cursor:'pointer', display:'flex'}}><Ic d={i.edit} size={11} /></button>
              <button onClick={() => deleteBook(book.id)} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.rust, padding:5, cursor:'pointer', display:'flex'}}><Ic d={i.trash} size={11} /></button>
            </div>
          </div>
        ))}
      </section>

      <section style={{marginBottom:14}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span style={{fontFamily:'ui-monospace, monospace', fontSize:9, letterSpacing:'0.25em', color:C.sage, textTransform:'uppercase'}}>가이드 Tasks</span>
          <button onClick={addTask} style={{padding:'4px 10px', background:`${C.sage}20`, border:`1px solid ${C.sage}`, color:C.sage, cursor:'pointer', fontSize:10, fontFamily:'ui-monospace, monospace', letterSpacing:'0.1em', display:'flex', alignItems:'center', gap:4}}>
            <Ic d={i.plus} size={9} />추가
          </button>
        </div>
        {[1,2,3,4,5].map(week => {
          const weekTasks = data.guideTasks.filter(t => t.week === week);
          if (weekTasks.length === 0) return null;
          return (
            <div key={week} style={{marginBottom:8}}>
              <div style={{fontSize:9.5, fontFamily:'ui-monospace, monospace', color:C.sage, letterSpacing:'0.2em', marginBottom:4, textTransform:'uppercase', opacity:0.7}}>Week {week}</div>
              {weekTasks.map(t => {
                const done = !!data.guideTasksDone[t.id];
                return (
                  <div key={t.id} style={{background:C.bg2, border:`1px solid ${C.line}`, padding:'8px 12px', marginBottom:3, display:'flex', justifyContent:'space-between', alignItems:'center', gap:8}}>
                    <button onClick={() => saveData({...data, guideTasksDone: {...data.guideTasksDone, [t.id]: !done}})} style={{
                      width:14, height:14,
                      border: `1px solid ${done ? C.sage : C.line}`,
                      background: done ? C.sage : 'transparent',
                      cursor:'pointer', flexShrink:0,
                      display:'flex', alignItems:'center', justifyContent:'center'
                    }}>{done && <Ic d={i.check} size={9} color={C.bg} strokeWidth={3} />}</button>
                    <span style={{flex:1, fontSize:11, color: done ? C.inkDim : C.ink, textDecoration: done ? 'line-through' : 'none', lineHeight:1.4}}>{t.label}</span>
                    <div style={{display:'flex', gap:3, flexShrink:0}}>
                      <button onClick={() => setModal({type:'task', id:t.id})} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.inkDim, padding:4, cursor:'pointer', display:'flex'}}><Ic d={i.edit} size={9} /></button>
                      <button onClick={() => deleteTask(t.id)} style={{background:'transparent', border:`1px solid ${C.line}`, color:C.rust, padding:4, cursor:'pointer', display:'flex'}}><Ic d={i.trash} size={9} /></button>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </section>

      <section style={{marginBottom:14}}>
        <button onClick={() => {
          if (window.confirm('모든 데이터를 초기화하시겠어요? Export 백업 먼저 권장.')) saveData(initialData());
        }} style={{width:'100%', padding:'10px', background:'rgba(199,86,64,0.1)', border:`1px solid ${C.rust}`, color:C.rust, cursor:'pointer', fontSize:10.5, fontFamily:'ui-monospace, monospace', letterSpacing:'0.15em', display:'flex', alignItems:'center', justifyContent:'center', gap:6, textTransform:'uppercase'}}>
          <Ic d={i.rotate} size={11} />전체 초기화
        </button>
      </section>

      <Modal open={!!editingAxis} onClose={() => setModal(null)} title="Edit Axis">
        {editingAxis && <AxisEditor axis={editingAxis} onUpdate={(patch) => updateAxis(editingAxis.id, patch)} />}
      </Modal>
      <Modal open={!!editingBook} onClose={() => setModal(null)} title="Edit Book">
        {editingBook && <BookEditor book={editingBook} onUpdate={(patch) => updateBook(editingBook.id, patch)} />}
      </Modal>
      <Modal open={!!editingTask} onClose={() => setModal(null)} title="Edit Task">
        {editingTask && <TaskEditor task={editingTask} onUpdate={(patch) => updateTask(editingTask.id, patch)} />}
      </Modal>
    </div>
  );
}

const inputStyle = { width:'100%', padding:'8px 10px', background:'rgba(0,0,0,0.25)', border:`1px solid ${C.line}`, color:C.ink, fontSize:12, outline:'none', boxSizing:'border-box', marginBottom:10 };
const labelStyle = { fontSize:9.5, fontFamily:'ui-monospace, monospace', color:C.inkDim, letterSpacing:'0.15em', marginBottom:4, display:'block', textTransform:'uppercase' };

function AxisEditor({ axis, onUpdate }) {
  return (
    <div>
      <label style={labelStyle}>이름</label>
      <input style={inputStyle} value={axis.label} onChange={e => onUpdate({ label: e.target.value })} />
      <label style={labelStyle}>설명</label>
      <input style={inputStyle} value={axis.sub} onChange={e => onUpdate({ sub: e.target.value })} />
      <label style={labelStyle}>아이콘</label>
      <div style={{display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:5, marginBottom:10}}>
        {ICON_OPTIONS.map(iname => (
          <button key={iname} onClick={() => onUpdate({ icon: iname })} style={{
            padding:8, background: axis.icon === iname ? `${axis.color}30` : 'rgba(0,0,0,0.25)',
            border:`1px solid ${axis.icon === iname ? axis.color : C.line}`,
            cursor:'pointer', display:'flex', justifyContent:'center', alignItems:'center'
          }}>
            <Ic d={i[iname]} size={14} color={axis.icon === iname ? axis.color : C.inkDim} />
          </button>
        ))}
      </div>
      <label style={labelStyle}>색상</label>
      <div style={{display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:5}}>
        {COLOR_OPTIONS.map(c => (
          <button key={c} onClick={() => onUpdate({ color: c })} style={{
            height:30, background: c, opacity: axis.color === c ? 1 : 0.5,
            border:`2px solid ${axis.color === c ? C.ink : 'transparent'}`,
            cursor:'pointer'
          }} />
        ))}
      </div>
    </div>
  );
}

function BookEditor({ book, onUpdate }) {
  return (
    <div>
      <label style={labelStyle}>제목</label>
      <input style={inputStyle} value={book.title} onChange={e => onUpdate({ title: e.target.value })} />
      <label style={labelStyle}>저자</label>
      <input style={inputStyle} value={book.author} onChange={e => onUpdate({ author: e.target.value })} />
      <label style={labelStyle}>Axis</label>
      <select value={book.axis} onChange={e => onUpdate({ axis: e.target.value })} style={inputStyle}>
        <option value="I">I (지경학+사회과학)</option>
        <option value="II">II (에너지경제학)</option>
        <option value="III">III</option>
        <option value="IV">IV</option>
      </select>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
        <div>
          <label style={labelStyle}>현재</label>
          <input type="number" style={inputStyle} value={book.progress} onChange={e => onUpdate({ progress: parseInt(e.target.value) || 0 })} />
        </div>
        <div>
          <label style={labelStyle}>총 페이지</label>
          <input type="number" style={inputStyle} value={book.total} onChange={e => onUpdate({ total: parseInt(e.target.value) || 1 })} />
        </div>
      </div>
    </div>
  );
}

function TaskEditor({ task, onUpdate }) {
  return (
    <div>
      <label style={labelStyle}>주차 (1~5)</label>
      <input type="number" min="1" max="5" style={inputStyle} value={task.week} onChange={e => onUpdate({ week: parseInt(e.target.value) || 1 })} />
      <label style={labelStyle}>내용</label>
      <textarea style={{...inputStyle, minHeight:60, resize:'vertical'}} value={task.label} onChange={e => onUpdate({ label: e.target.value })} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
